name: Refresh EDGAR company data

on:
  schedule:
    - cron: "30 5 * * *"   # nightly, 05:30 UTC (after SEC rebuilds the bulk file)
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download SEC bulk data
        # SEC requires a User-Agent identifying you — put YOUR email here.
        run: |
          curl -sS -L --retry 3 -H "User-Agent: intrinsic-value-engine markbenchss@gmail.com" \
            -o companyfacts.zip \
            "https://www.sec.gov/Archives/edgar/daily-index/xbrl/companyfacts.zip"
          curl -sS -L --retry 3 -H "User-Agent: intrinsic-value-engine markbenchss@gmail.com" \
            -o company_tickers.json \
            "https://www.sec.gov/files/company_tickers.json"
          ls -lh companyfacts.zip company_tickers.json

      - name: Build per-ticker data files
        run: python3 scripts/build_data.py companyfacts.zip company_tickers.json data/

      - name: Commit refreshed data
        run: |
          git config user.name "edgar-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Nightly EDGAR data refresh"
          git push
